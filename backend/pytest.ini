[pytest]
testpaths = tests
asyncio_mode = auto
addopts = -ra
markers =
    slow: long-running end-to-end processing tests (still run by default)
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::FutureWarning
    ignore:Using .httpx. with .starlette.testclient.:Warning
